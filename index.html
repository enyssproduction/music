<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enyss - Portfolio</title>

<link rel="shortcut icon" href="ENYSSIMG.png" type="image/x-icon">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

<style>
body {
    margin: 0;
    font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
    background: linear-gradient(135deg, #1e1e1e, #3a3a3a);
    color: #e8e8e8;
    text-align: center;
}

/* ===== NEW HEADER ===== */
nav {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 1000;
}

/* pill container */
.nav-wrapper {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(15px);
    box-shadow: 
        0 10px 30px rgba(0,0,0,0.4),
        inset 0 0 10px rgba(255,255,255,0.1);
}

/* buttons */
.nav-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 20px;
    border-radius: 999px;
    color: #fff;
    text-decoration: none;
    font-weight: 600;
    background: rgba(255,255,255,0.05);
    position: relative;
    overflow: hidden;
    transition: all 0.3s ease;
}

/* glow border hover */
.nav-btn::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 999px;
    padding: 1px;
    background: linear-gradient(120deg, transparent, #ffffff, transparent);
    -webkit-mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    opacity: 0;
    transition: opacity 0.3s ease;
}

.nav-btn:hover::before {
    opacity: 1;
}

.nav-btn:hover {
    transform: scale(1.05);
    background: rgba(255,255,255,0.12);
}

.nav-btn i {
    font-size: 14px;
}

/* spacing fix */
.container {
    padding-top: 140px;
}

/* ===== REST OF YOUR ORIGINAL CSS (UNCHANGED) ===== */

#particles-canvas {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -1;
    filter: blur(5px);
}

/* keep everything else exactly the same */

</style>
</head>

<body>

<canvas id="particles-canvas"></canvas>

<!-- ===== NEW HEADER HTML ===== -->
<nav>
    <div class="nav-wrapper">
        <a href="#experience" class="nav-btn">
            <i class="fas fa-power-off"></i> Games Status
        </a>

        <a href="#" class="nav-btn">
            <i class="fas fa-arrow-up-right-from-square"></i> Roblox Group
        </a>

        <a href="#info" class="nav-btn">
            <i class="fas fa-info-circle"></i> About Us
        </a>
    </div>
</nav>

<!-- ===== REST OF YOUR PAGE (UNCHANGED) ===== -->

<div class="container hero">
    <h1>Welcome to Enyss</h1>
</div>

</body>
</html>
